<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade2</title>
</head>
<body>

        <h1>Cadastro de Produtos</h1>
        <label for="Produto">Nome do Produto:</label>
        <input type="text" id="Produto">


        <label for="Qtde">Estoque:</label>
        <input type="number" id="Qtde">

        <button type="button" id="btnAdicionar">
        Salvar Produto
        </button>

        <br><br>

        table border="1">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Produto</th>
                    <th>Qtde Estoque</th>
                </tr>
            </thead>

            <tbody id="tabelaProdutos">

            </tbody>

        </table>

        <br><br><br>

        <h2>Adicionar/Retirar Estoque</h2>

        <label for="prdId">Id do produto:</label>
        <input type="number" id="prdId">

        <label for="quantidade">Quantidade:</label>
        <input type="number" id="quantidade">

        <br><br>

        <input type="radio" name="acao" id="adicionar" checked>
        <label for="adicionar">Adicionar</label>

    <input type="radio" name="acao" id="remover"> 
    <label for="remover">Remover</label>

        <br><br>

        <button type="button" id="btnConfirmar">Confirmar</button>

        <script src="scripts.js"></script>

    </body>
    </html>
